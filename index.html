<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#22c55e">

    <title>BloxdTool</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

</head>

<body>

    <!-- ===========================
         Header
    ============================ -->

    <header class="header">

        <h1>座標ツール</h1>

        <p>made by Notato</p>

    </header>

    <!-- この下にページの内容 -->

    <script src="script.js"></script>

    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("./service-worker.js")
                .then(() => console.log("Service Worker登録完了"))
                .catch(err => console.error(err));
        });
    }
    </script>

</body>
</html>

    <!-- ===========================
         Main
    ============================ -->

    <main class="container">

        <!-- =======================
             Name Finder
        ======================== -->

        <section class="card">

            <h2>📍 名札座標推定</h2>

            <p class="description">

                現在地と名札までの距離を入力して、
                推定座標を計算します。

            </p>

            <div class="input-group">

                <label for="playerX">
                    現在地 X
                </label>

                <input
                    id="playerX"
                    type="number"
                    placeholder="例: 1250">

                <label for="playerZ">
                    現在地 Z
                </label>

                <input
                    id="playerZ"
                    type="number"
                    placeholder="例: -340">

                <label for="distance">
                    距離 (m)
                </label>

                <input
                    id="distance"
                    type="number"
                    placeholder="例: 86">

            </div>

            <div class="button-group">

                <button id="addMeasurement">

                    ＋ 測定を追加

                </button>

                <button id="clearMeasurements">

                    🗑 測定削除

                </button>

                <button id="solveButton">

                    🎯 推定開始

                </button>

            </div>

        </section>

        <!-- =======================
             Measurements
        ======================== -->

        <section class="card">

            <h2>📋 測定一覧</h2>

            <div id="measurementList">

                <p class="placeholder">

                    まだ測定データはありません。

                </p>

            </div>

        </section>

        <!-- =======================
             Result
        ======================== -->

        <section class="card">

            <h2>⭐ 推定結果</h2>

            <div id="result">

                <p class="placeholder">

                    推定開始を押すと表示されます。

                </p>

            </div>

        </section>

 <div id="measurementInfo" class="card">

    <h3>📍 選択中の測定</h3>

    <p class="placeholder">

        測定点をクリックしてください

    </p>

</div>

        <!-- =======================
             Map
        ======================== -->

        <section class="card">

    <h2>🗺️ マップ</h2>

   <div class="map-options">

    <label>

        <input
            type="checkbox"
            id="heatmapToggle"
            checked>

        ヒートマップ表示

    </label>

</div>

    <div class="mapContainer">

        <canvas
            id="mapCanvas"
            width="900"
            height="900">
        </canvas>

        <div id="cursorInfo">

            X : --

            <br>

            Z : --

        </div>

    </div>

</section>



    </main>

    
    <!-- ===========================
         Footer
    ============================ -->

    <footer class="footer">

        <p>

            座標ツール v0.6.0

        </p>

        <p>

            Made for Bloxd.io Players

        </p>

    </footer>

    <!-- ===========================
         JavaScript
    ============================ -->

    <script src="js/solver.js"></script>
    <script src="js/map.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
